name: Update Daily Quote

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pick random quote
        id: quote
        run: |
          QUOTE=$(shuf -n 1 quotes.txt)
          echo "quote=$QUOTE" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          QUOTE="${{ steps.quote.outputs.quote }}"

          awk -v quote="$QUOTE" '
          /<!--START_SECTION:quote-->/ { print; print quote; skip=1; next }
          /<!--END_SECTION:quote-->/ { skip=0 }
          !skip
          ' README.md > README.tmp

          mv README.tmp README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update daily quote" || exit 0
          git push
